<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant | Foodie</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-wrapper">
    <a href="index.html" class="logo">Foodie</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="restaurants.html">Restaurants</a>
      <a href="cart.html">Cart</a>
      <a href="login.html" class="btn-outline">Login</a>
    </nav>
  </div>
</header>

<!-- BANNER -->
<section class="restaurant-banner">
  <img id="bannerImg" src="" alt="Restaurant">
  <div class="banner-overlay">
    <h1 id="restaurantName"></h1>
    <p id="restaurantDesc"></p>
  </div>
</section>

<!-- CONTENT -->
<section class="section">
  <div class="container restaurant-layout">

    <!-- MENU -->
    <div>
      <h2>Menu</h2>
      <div class="menu-grid" id="menuGrid"></div>
    </div>

    <!-- CART PREVIEW -->
    <div class="cart-preview">
      <h3>Your Cart</h3>
      <ul id="cartItems"></ul>
      <div class="cart-total">
        <span>Total</span>
        <strong>₹<span id="totalPrice">0</span></strong>
      </div>
      <a href="cart.html" class="btn-primary full">View Cart</a>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer-grid">
    <div>
      <h3>Foodie</h3>
      <p>Delicious food delivered to your doorstep.</p>
    </div>
    <div>
      <h4>Company</h4>
      <a href="#">About</a>
      <a href="#">Careers</a>
    </div>
    <div>
      <h4>Legal</h4>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
  </div>
  <p class="copyright">© 2026 Foodie</p>
</footer>

<script src="js/restaurant.js"></script>
</body>
</html>
